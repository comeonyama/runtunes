AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: RunTunes API on AWS Lambda and API Gateway HTTP API

Parameters:
  FrontendOrigin:
    Type: String
    Description: Production frontend origin, without a trailing slash
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API key used by the Lambda function
  SpotifyClientId:
    Type: String
    Description: Spotify application client ID
  SpotifyRedirectUri:
    Type: String
    Description: Spotify OAuth redirect URI
  ApiDomainName:
    Type: String
    Default: api.discoverroutes.jp
    Description: Custom domain name for the HTTP API
  ApiCertificateArn:
    Type: String
    Description: ACM certificate ARN for the API custom domain in this region
  BudgetNotificationEmail:
    Type: String
    Description: Email address that receives monthly AWS cost alerts

Resources:
  RunTunesHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      DefinitionBody:
        openapi: 3.0.1
        info:
          title: RunTunes API
          version: "1.0"
        paths: {}
      CorsConfiguration:
        AllowCredentials: true
        AllowOrigins:
          - !Ref FrontendOrigin
        AllowHeaders:
          - Content-Type
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        MaxAge: 600
      DefaultRouteSettings:
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10
      RouteSettings:
        "POST /api/openai/select-tracks":
          ThrottlingBurstLimit: 1
          ThrottlingRateLimit: 0.2

  RunTunesApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-api
      CodeUri: ../backend/.lambda-package/
      Handler: dist/lambda.handler
      Runtime: nodejs22.x
      MemorySize: 512
      Timeout: 28
      ReservedConcurrentExecutions: 2
      Environment:
        Variables:
          FRONTEND_ORIGIN: !Ref FrontendOrigin
          OPENAI_API_KEY: !Ref OpenAIApiKey
          SPOTIFY_CLIENT_ID: !Ref SpotifyClientId
          SPOTIFY_REDIRECT_URI: !Ref SpotifyRedirectUri
      Events:
        ExchangeSpotifyToken:
          Type: HttpApi
          Properties:
            ApiId: !Ref RunTunesHttpApi
            Path: /api/spotify/token
            Method: POST
            PayloadFormatVersion: "2.0"
        LogoutSpotify:
          Type: HttpApi
          Properties:
            ApiId: !Ref RunTunesHttpApi
            Path: /api/spotify/logout
            Method: POST
            PayloadFormatVersion: "2.0"
        GetTracks:
          Type: HttpApi
          Properties:
            ApiId: !Ref RunTunesHttpApi
            Path: /api/spotify/tracks
            Method: GET
            PayloadFormatVersion: "2.0"
        GetProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref RunTunesHttpApi
            Path: /api/spotify/profile
            Method: GET
            PayloadFormatVersion: "2.0"
        SelectTracks:
          Type: HttpApi
          Properties:
            ApiId: !Ref RunTunesHttpApi
            Path: /api/openai/select-tracks
            Method: POST
            PayloadFormatVersion: "2.0"
        CreatePlaylist:
          Type: HttpApi
          Properties:
            ApiId: !Ref RunTunesHttpApi
            Path: /api/spotify/playlists
            Method: POST
            PayloadFormatVersion: "2.0"

  RunTunesApiDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Ref ApiDomainName
      DomainNameConfigurations:
        - CertificateArn: !Ref ApiCertificateArn
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  RunTunesApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref RunTunesHttpApi
      DomainName: !Ref RunTunesApiDomainName
      Stage: $default

  RunTunesApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-api
      RetentionInDays: 14

  MonthlyCostBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub ${AWS::StackName}-monthly-cost
        BudgetLimit:
          Amount: 5
          Unit: USD
        BudgetType: COST
        TimeUnit: MONTHLY
      NotificationsWithSubscribers:
        - Notification:
            ComparisonOperator: GREATER_THAN
            NotificationType: ACTUAL
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - Address: !Ref BudgetNotificationEmail
              SubscriptionType: EMAIL
        - Notification:
            ComparisonOperator: GREATER_THAN
            NotificationType: ACTUAL
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - Address: !Ref BudgetNotificationEmail
              SubscriptionType: EMAIL
        - Notification:
            ComparisonOperator: GREATER_THAN
            NotificationType: FORECASTED
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - Address: !Ref BudgetNotificationEmail
              SubscriptionType: EMAIL

Outputs:
  ApiBaseUrl:
    Description: Set this value as frontend VITE_API_BASE_URL
    Value: !Sub https://${ApiDomainName}
  ExecuteApiBaseUrl:
    Description: Default API Gateway URL for diagnostics
    Value: !Sub https://${RunTunesHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}
  ApiCustomDomainTarget:
    Description: Set this as the DNS CNAME target for ApiDomainName
    Value: !GetAtt RunTunesApiDomainName.RegionalDomainName
  LambdaFunctionName:
    Value: !Ref RunTunesApiFunction
